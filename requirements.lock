# Project dependency closure, fully pinned for reproducible builds.
#
# These are the packages the project layer installs/upgrades ON TOP OF the
# base image pinned in the Dockerfile (vllm/vllm-openai, which already
# provides PyTorch, CUDA, vLLM, and many shared libs at fixed versions).
# Together — pinned base image + this lockfile — a build is deterministic.
#
# Regenerate with `make lock` whenever pyproject.toml or the base image
# digest changes (keep the Makefile BASE_IMAGE in sync with the Dockerfile).
