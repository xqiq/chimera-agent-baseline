<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.10"/>
    </filter>
    <filter id="glow" x="-6%" y="-6%" width="112%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#d97706"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="760" rx="16" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="460" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a" letter-spacing="-0.02em">CHIMERA Agent — System Architecture</text>
  <text x="460" y="60" text-anchor="middle" font-size="12" fill="#94a3b8">LangGraph ReAct loop · MCP tool server · vLLM inference</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  SYSTEM PROMPT (top-left, feeds down)           -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="75" y="80" width="200" height="100" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="175" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">System Prompt</text>
  <line x1="95" y1="115" x2="255" y2="115" stroke="#e2e8f0" stroke-width="1"/>
  <text x="175" y="134" text-anchor="middle" font-size="10" fill="#64748b">Task instructions</text>
  <text x="175" y="150" text-anchor="middle" font-size="10" fill="#64748b">Output schema (JSON)</text>
  <text x="175" y="166" text-anchor="middle" font-size="10" fill="#64748b">Skill summaries</text>

  <!-- Arrow: System Prompt → down to START bubble -->
  <path d="M 175,180 L 175,284" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  STRUCTURED OUTPUT (top-right, fed from below)  -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="645" y="80" width="200" height="100" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="745" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Structured Output</text>
  <line x1="665" y1="115" x2="825" y2="115" stroke="#e2e8f0" stroke-width="1"/>
  <text x="745" y="134" text-anchor="middle" font-size="10" fill="#64748b">Prediction JSON</text>
  <text x="745" y="150" text-anchor="middle" font-size="10" fill="#64748b">Reasoning trace</text>
  <text x="745" y="166" text-anchor="middle" font-size="10" fill="#64748b">Action log</text>

  <!-- Arrow: END bubble → up to Structured Output -->
  <path d="M 745,284 L 745,180" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  MAIN AGENT BOX                                 -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="210" y="228" width="500" height="120" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="460" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#4338ca">Agent  (LangGraph ReAct)</text>

  <!-- Inner sub-boxes: agent node + tools node -->
  <rect x="250" y="270" width="160" height="58" rx="8" fill="#fff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="330" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">agent</text>
  <text x="330" y="312" text-anchor="middle" font-size="10" fill="#6366f1">LLM inference</text>

  <rect x="510" y="270" width="160" height="58" rx="8" fill="#fff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="590" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">tools</text>
  <text x="590" y="312" text-anchor="middle" font-size="10" fill="#6366f1">MCP tool execution</text>

  <!-- ReAct loop arrows between agent ↔ tools -->
  <path d="M 410,288 L 510,288" fill="none" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrow-indigo)"/>
  <path d="M 510,312 L 410,312" fill="none" stroke="#6366f1" stroke-width="1.2" marker-end="url(#arrow-indigo)"/>
  <text x="460" y="283" text-anchor="middle" font-size="8.5" fill="#818cf8">tool calls</text>
  <text x="460" y="324" text-anchor="middle" font-size="8.5" fill="#818cf8">results</text>

  <!-- START bubble (left of agent box) → agent node -->
  <circle cx="175" cy="300" r="16" fill="#6366f1"/>
  <text x="175" y="304" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff" letter-spacing="0.3">START</text>
  <path d="M 191,300 L 250,300" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>

  <!-- agent node → END bubble (right of agent box) -->
  <path d="M 670,300 L 729,300" fill="none" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/>
  <circle cx="745" cy="300" r="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="745" y="304" text-anchor="middle" font-size="8.5" font-weight="700" fill="#fff" letter-spacing="0.3">END</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  Vertical connectors: agent box → lower layer   -->
  <!-- ═══════════════════════════════════════════════ -->
  <path d="M 330,348 L 330,410" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="318" y="384" text-anchor="end" font-size="10" fill="#64748b">tool calls</text>

  <path d="M 590,348 L 590,410" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="602" y="384" text-anchor="start" font-size="10" fill="#64748b">inference</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  LLM BOX                                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="480" y="414" width="230" height="110" rx="12" fill="#fdf4ff" stroke="#c084fc" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="595" y="442" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">LLM  (vLLM)</text>
  <line x1="500" y1="452" x2="690" y2="452" stroke="#e9d5ff" stroke-width="1"/>
  <text x="595" y="472" text-anchor="middle" font-size="11" fill="#7e22ce" font-weight="500">google/gemma-4-E2B-it</text>
  <text x="595" y="490" text-anchor="middle" font-size="10" fill="#a855f7">Tool-calling support</text>
  <text x="595" y="506" text-anchor="middle" font-size="10" fill="#a855f7">bf16 · ~10 GB VRAM</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  MCP TOOL SERVER BOX                            -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="40" y="414" width="400" height="220" rx="12" fill="#ecfdf5" stroke="#34d399" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="240" y="442" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">MCP Tool Server</text>
  <text x="240" y="458" text-anchor="middle" font-size="10" fill="#10b981">stdio transport · FastMCP</text>

  <!-- Clinical Data Tools column -->
  <rect x="60" y="472" width="175" height="148" rx="8" fill="#fff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="148" y="492" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Clinical Data Tools</text>
  <line x1="74" y1="500" x2="222" y2="500" stroke="#d1fae5" stroke-width="1"/>

  <rect x="74" y="508" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="148" y="522" text-anchor="middle" font-size="9.5" fill="#166534">get_clinical_info</text>

  <rect x="74" y="532" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="148" y="546" text-anchor="middle" font-size="9.5" fill="#166534">get_gleason_grades</text>

  <rect x="74" y="556" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="148" y="570" text-anchor="middle" font-size="9.5" fill="#166534">get_mri_findings</text>

  <rect x="74" y="580" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="148" y="594" text-anchor="middle" font-size="9.5" fill="#166534">get_pathology_staging</text>

  <!-- Knowledge & Utility column -->
  <rect x="250" y="472" width="175" height="148" rx="8" fill="#fff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="338" y="492" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Knowledge &amp; Utility</text>
  <line x1="264" y1="500" x2="412" y2="500" stroke="#d1fae5" stroke-width="1"/>

  <rect x="264" y="508" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="338" y="522" text-anchor="middle" font-size="9.5" fill="#166534">search_guidelines</text>

  <rect x="264" y="532" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="338" y="546" text-anchor="middle" font-size="9.5" fill="#166534">get_surgical_pathology</text>

  <rect x="264" y="556" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="338" y="570" text-anchor="middle" font-size="9.5" fill="#166534">get_follow_up</text>

  <rect x="264" y="580" width="148" height="20" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.8"/>
  <text x="338" y="594" text-anchor="middle" font-size="9.5" fill="#166534">load_skill / action_log</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  DATA SOURCES (bottom row)                      -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Case Data -->
  <rect x="40" y="670" width="160" height="68" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="120" y="696" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Case Data</text>
  <text x="120" y="714" text-anchor="middle" font-size="10" fill="#64748b">queries.json</text>
  <text x="120" y="728" text-anchor="middle" font-size="9" fill="#94a3b8">RUMC · Karolinska</text>
  <path d="M 120,634 L 120,670" fill="none" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>

  <!-- ChromaDB -->
  <rect x="240" y="670" width="160" height="68" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="320" y="696" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">ChromaDB</text>
  <text x="320" y="714" text-anchor="middle" font-size="10" fill="#64748b">EAU Guidelines</text>
  <text x="320" y="728" text-anchor="middle" font-size="9" fill="#94a3b8">Semantic search</text>
  <path d="M 320,634 L 320,670" fill="none" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-emerald)"/>

  <!-- Agent Skills -->
  <rect x="480" y="560" width="160" height="68" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Agent Skills</text>
  <text x="560" y="604" text-anchor="middle" font-size="10" fill="#64748b">skills/*.md</text>
  <text x="560" y="618" text-anchor="middle" font-size="9" fill="#94a3b8">Task-specific prompts</text>
  <path d="M 480,590 L 440,560 L 440,540" fill="none" stroke="#10b981" stroke-width="1.1" stroke-dasharray="5,3" marker-end="url(#arrow-emerald)"/>

  <!-- Hydra Config -->
  <rect x="700" y="560" width="180" height="68" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <text x="790" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Hydra Config</text>
  <text x="790" y="604" text-anchor="middle" font-size="10" fill="#64748b">configs/config.yaml</text>
  <text x="790" y="618" text-anchor="middle" font-size="9" fill="#94a3b8">Model · Agent · Tools</text>
  <path d="M 700,580 L 660,555 L 660,524" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!--  EXECUTION FLOW (bottom-right)                  -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="480" y="660" width="400" height="80" rx="12" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" filter="url(#shadow)"/>
  <text x="680" y="684" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Execution Flow</text>
  <line x1="500" y1="692" x2="860" y2="692" stroke="#fde68a" stroke-width="1"/>

  <!-- Flow steps as individual positioned text elements -->
  <text x="510" y="708" font-size="10" fill="#78350f" font-weight="500">1.</text>
  <text x="524" y="708" font-size="10" fill="#78350f">Load queries + start MCP server (stdio)</text>

  <text x="510" y="724" font-size="10" fill="#78350f" font-weight="500">2.</text>
  <text x="524" y="724" font-size="10" fill="#78350f">ReAct loop: agent &#x2192; tools &#x2192; agent &#x2192; &#x2026; &#x2192; END</text>

  <text x="680" y="708" font-size="10" fill="#78350f" font-weight="500">3.</text>
  <text x="694" y="708" font-size="10" fill="#78350f">Build prompt with skills + schema</text>

  <text x="680" y="724" font-size="10" fill="#78350f" font-weight="500">4.</text>
  <text x="694" y="724" font-size="10" fill="#78350f">Extract prediction JSON + trace</text>

  <!-- Version tag -->
  <text x="900" y="752" text-anchor="end" font-size="9" fill="#cbd5e1">chimera-agent-baseline v0.1</text>
</svg>